name: Cypress Test Suite and Deploy to Firebase

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Node.js for Cypress
        uses: actions/setup-node@v2
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Run Cypress tests
        run: npx cypress run

  deploy:
    runs-on: ubuntu-latest
    needs: cypress-run  # Ensure deploy runs after Cypress tests pass
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Set up Node.js for Firebase deploy
        uses: actions/setup-node@v2
        with:
          node-version: '20'  # Adjusted to match your current Node version
      - name: Install dependencies
        run: npm install
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: cypress-project-2025
        env:
          FIREBASE_CLI_PREVIEWS: hostingchannels
